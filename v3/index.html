<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>드래곤볼 로그라이트 v3</title>
<style>
:root {
  --bg: #05050f;
  --bg2: #0a0a1a;
  --bg3: #0f0f22;
  --border: #1e1e3a;
  --border-active: #4466ff;
  --text: #bbbbdd;
  --text-dim: #555577;
  --text-bright: #eeeeff;
  --red: #ff4444;
  --green: #33ff77;
  --yellow: #ffdd33;
  --blue: #4488ff;
  --purple: #aa44ff;
  --orange: #ff8833;
  --common: #3a3a5a;
  --uncommon: #1a5a3a;
  --rare: #5a1a5a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;width:100vw;height:100vh;height:100dvh;overflow:hidden;user-select:none;padding-bottom:env(safe-area-inset-bottom);box-sizing:border-box;}
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;}

/* ===== MAP SCREEN ===== */
#screen-map{flex-direction:column;align-items:center;padding:16px;overflow-y:auto;background:radial-gradient(ellipse at top,#0a0a20 0%,#05050f 70%);}
.map-title{font-size:30px;font-weight:bold;color:var(--blue);margin-bottom:4px;text-shadow:0 0 20px #4488ff55;}
.map-subtitle{font-size:13px;color:var(--text-dim);margin-bottom:12px;}
.map-player-status{font-size:15px;color:var(--green);margin-bottom:14px;background:var(--bg2);padding:8px 20px;border-radius:8px;border:1px solid #112211;}
.floor-list{width:100%;max-width:680px;}
.floor-row{display:flex;align-items:center;padding:9px 14px;margin-bottom:3px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);font-size:14px;transition:all 0.15s;}
.floor-row.current{border-color:var(--blue);background:#080d1e;}
.floor-row.completed{border-color:#112211;background:#060e06;opacity:0.7;}
.floor-num{width:44px;font-weight:bold;color:var(--text-dim);}
.floor-enemy{flex:1;text-align:center;}
.floor-status{width:60px;text-align:right;}
.floor-row.boss .floor-enemy{color:var(--red);font-weight:bold;}
.floor-row.elite .floor-enemy{color:var(--orange);}
.map-enter-btn{margin-top:14px;padding:13px 38px;font-size:17px;font-weight:bold;background:#0d0520;border:2px solid var(--purple);color:var(--purple);border-radius:8px;cursor:pointer;transition:all 0.15s;}
.map-enter-btn:hover{background:#1a0a36;color:#fff;box-shadow:0 0 16px #aa44ff55;}

/* ===== BATTLE SCREEN ===== */
#screen-battle{flex-direction:row;height:100vh;height:100dvh;overflow:hidden;}
.battle-main{flex:1;display:flex;flex-direction:column;min-width:0;padding:0 6px;overflow:hidden;}

/* Enemy section */
.enemy-section{background:linear-gradient(180deg,#060614 0%,#0b0b20 100%);border-bottom:2px solid #181830;padding:8px 12px;flex-shrink:0;}
.enemy-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.enemy-name{font-size:19px;font-weight:bold;color:var(--text-bright);}
.enemy-type-badge{font-size:11px;padding:2px 7px;border-radius:10px;font-weight:bold;}
.badge-normal{background:#1a1a1a;color:#777;border:1px solid #333;}
.badge-elite{background:#1e1000;color:var(--orange);border:1px solid var(--orange);}
.badge-boss{background:#1e0000;color:var(--red);border:1px solid var(--red);}
.info-btn{margin-left:auto;background:none;border:1px solid #333355;color:#777799;border-radius:4px;padding:2px 7px;cursor:pointer;font-size:12px;}
.info-btn:hover{border-color:var(--blue);color:var(--blue);}

.hp-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hp-label{font-size:12px;color:var(--text-dim);width:44px;}
.hp-bar-wrap{flex:1;height:12px;background:#150000;border-radius:6px;border:1px solid #2a0a0a;overflow:hidden;}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,#aa1111,#ff3333);border-radius:6px;transition:width 0.35s;}
.hp-bar-fill.player-fill{background:linear-gradient(90deg,#0a6620,#33ee55);}
.hp-text{font-size:12px;color:var(--red);width:64px;text-align:right;}
.hp-text.player-hp{color:var(--green);}

.ki-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.ki-label{font-size:12px;color:var(--text-dim);width:44px;}
.ki-dots{display:flex;gap:4px;}
.ki-dot{width:14px;height:14px;border-radius:50%;border:2px solid #22223a;background:#0a0a18;transition:all 0.2s;}
.ki-dot.filled{background:#ffbb00;border-color:#ffdd22;box-shadow:0 0 5px #ffaa00;}
.ki-dot.filled.max{background:#ff5500;border-color:#ff7700;box-shadow:0 0 8px #ff4400;}
.ki-text{font-size:12px;color:#ffcc33;}

/* Enemy queue display */
.enemy-queue-row{display:flex;gap:6px;justify-content:center;margin-top:4px;align-items:center;}
.queue-label{font-size:11px;color:var(--text-dim);margin-right:4px;}
.enemy-qcard{min-width:110px;height:70px;border:2px solid #222244;border-radius:7px;background:#080818;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;position:relative;transition:all 0.2s;}
.enemy-qcard .qcard-num{position:absolute;top:3px;left:5px;font-size:10px;color:var(--text-dim);}
.enemy-qcard.hidden{color:#333355;}
.enemy-qcard.revealed{border-color:#882222;background:#0e0608;}
.enemy-qcard.revealed .qcard-name{color:var(--red);font-weight:bold;font-size:13px;}
.enemy-qcard.revealed .qcard-desc{color:#886666;font-size:10px;text-align:center;padding:0 3px;}
.enemy-qcard.active-round{border-color:#ff3333!important;box-shadow:0 0 14px #ff3333;}
.enemy-qcard.consumed{opacity:0.25;border-color:#222;border-style:dashed;}

/* Battle message section */
.battle-msg-section{background:#07070f;border-bottom:1px solid #101025;padding:5px 12px;flex-shrink:0;text-align:center;min-height:34px;display:flex;align-items:center;justify-content:center;gap:10px;}
#phase-text{font-size:15px;color:var(--yellow);font-weight:bold;}
.passive-panel{font-size:11px;color:#7777bb;padding:2px 6px;border:1px solid #1a1a33;border-radius:4px;}
.passive-tag{display:inline-block;margin:0 3px;padding:1px 5px;border-radius:7px;background:#0d0d28;color:#9999ff;font-size:11px;transition:color 0.3s;}
.passive-tag.flash{color:#ffff00;}

/* Player section */
.player-section{background:linear-gradient(0deg,#060614 0%,#0b0b20 100%);border-top:2px solid #181830;padding:8px 12px;flex-shrink:0;}
.player-header{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.player-name{font-size:17px;font-weight:bold;color:var(--green);}

/* Player queue slots */
.player-queue-row{display:flex;gap:8px;justify-content:center;margin-top:5px;align-items:center;}
.player-qslot{min-width:120px;height:80px;border:2px dashed #1e1e36;border-radius:8px;background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.player-qslot .qslot-num{position:absolute;top:3px;left:6px;font-size:10px;color:var(--text-dim);}
.player-qslot:hover:not(.sense-disabled){border-color:var(--blue);}
.player-qslot.occupied{border-style:solid;border-color:#334488;background:#060d1e;}
.player-qslot.occupied .qslot-name{color:#88aaff;font-weight:bold;font-size:13px;}
.player-qslot.occupied .qslot-ki{color:#ffcc33;font-size:11px;}
.player-qslot.occupied .qslot-desc{color:#556677;font-size:10px;text-align:center;padding:0 3px;}
.player-qslot.active-round{border-color:#4488ff!important;box-shadow:0 0 14px #4488ff;}
.player-qslot.flash-red{border-color:var(--red)!important;box-shadow:0 0 12px var(--red);}
.player-qslot .remove-btn{position:absolute;top:2px;right:4px;font-size:10px;color:#553333;cursor:pointer;background:none;border:none;}
.player-qslot .remove-btn:hover{color:var(--red);}
.player-qslot.sense-disabled{opacity:0.25;pointer-events:none;border-style:dashed;border-color:#222;}
.player-qslot.consumed{opacity:0.25;border-color:#222;border-style:dashed;}

/* Versus indicator */
.vs-area{display:flex;align-items:center;justify-content:center;padding:3px 0;flex-shrink:0;}
.vs-badge{font-size:12px;font-weight:bold;color:var(--text-dim);background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:3px 12px;}

/* Card section */
.card-section{flex:1;display:flex;flex-direction:column;background:#04040e;border-top:1px solid #0e0e22;overflow:hidden;padding:5px 7px 4px;}
.card-section-label{font-size:12px;color:var(--text-dim);margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.hand-cards{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;flex:1;padding-bottom:4px;align-items:flex-start;}
.hand-cards::-webkit-scrollbar{height:5px;}
.hand-cards::-webkit-scrollbar-track{background:#090909;}
.hand-cards::-webkit-scrollbar-thumb{background:#222244;border-radius:3px;}

.card{width:120px;min-width:120px;height:160px;border-radius:8px;border:2px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;padding:7px;cursor:pointer;transition:all 0.15s;flex-shrink:0;position:relative;}
.card:hover{transform:translateY(-5px);border-color:#5577bb;box-shadow:0 4px 12px rgba(68,136,255,0.2);}
.card.selected{border-color:var(--yellow);box-shadow:0 0 14px #ffdd3366;}
.card.common{background:#0b0b1a;}
.card.uncommon{background:#070d0b;}
.card.rare{background:#0b070b;}
.card.insufficient{opacity:0.4;}
.card .card-ki-cost{position:absolute;top:5px;right:7px;font-size:14px;font-weight:bold;}
.card .card-ki-cost.free{color:var(--green);}
.card .card-ki-cost.cheap{color:var(--yellow);}
.card .card-ki-cost.costly{color:var(--red);}
.card .card-name{font-size:12px;font-weight:bold;color:var(--text-bright);margin-bottom:3px;padding-right:22px;line-height:1.2;}
.card .card-rarity-bar{height:2px;border-radius:2px;margin-bottom:5px;}
.card.common .card-rarity-bar{background:#3a3a5a;}
.card.uncommon .card-rarity-bar{background:#1a6a3a;}
.card.rare .card-rarity-bar{background:#6a1a6a;}
.card .card-desc{font-size:10px;color:#7788aa;flex:1;line-height:1.4;}
.card .card-uses{font-size:10px;color:#775533;margin-top:3px;text-align:right;}
.card .card-reactive-badge{position:absolute;bottom:5px;left:5px;font-size:9px;padding:1px 4px;border-radius:5px;background:#150820;color:#9955ff;border:1px solid #551888;}

/* Execute button area */
.execute-area{display:flex;align-items:center;padding:5px 7px;padding-bottom:max(5px, env(safe-area-inset-bottom));gap:10px;flex-shrink:0;border-top:1px solid #0e0e22;}
#execute-btn{margin-left:auto;padding:9px 22px;font-size:17px;font-weight:bold;background:#060f06;border:2px solid var(--green);color:var(--green);border-radius:8px;cursor:pointer;transition:all 0.15s;min-width:150px;}
#execute-btn:hover{background:#102010;color:#fff;box-shadow:0 0 14px #33ff7744;}
#execute-btn:disabled{opacity:0.35;cursor:not-allowed;box-shadow:none;}
.execute-hint{font-size:12px;color:var(--text-dim);}

/* Battle log panel */
.battle-log-panel{width:220px;min-width:180px;display:flex;flex-direction:column;background:#030308;border-left:1px solid #121225;overflow:hidden;}
.log-title{padding:7px 10px;font-size:13px;font-weight:bold;color:#555577;border-bottom:1px solid #121225;flex-shrink:0;}
#battle-log{flex:1;overflow-y:auto;padding:5px 7px;display:flex;flex-direction:column;gap:2px;}
#battle-log::-webkit-scrollbar{width:3px;}
#battle-log::-webkit-scrollbar-thumb{background:#1a1a33;}
.log-entry{font-size:11px;color:#8888aa;line-height:1.4;padding:2px 3px;border-radius:2px;}
.log-entry.log-player{color:#5588ff;}
.log-entry.log-enemy{color:#ff6666;}
.log-entry.log-system{color:#ffcc33;}
.log-entry.log-divider{color:#222244;border-top:1px solid #0e0e22;padding-top:3px;}
.log-entry.log-passive{color:#9966ff;}
.log-entry.log-round{color:#33ddff;font-weight:bold;}

/* ===== CLASH ANIMATION OVERLAY ===== */
#clash-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:200;display:flex;align-items:center;justify-content:center;}
.clash-container{position:relative;width:600px;max-width:100vw;height:120px;display:flex;align-items:center;justify-content:center;}
.clash-card-label{position:absolute;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:0;}
.clash-card-label .clash-name{font-size:18px;font-weight:bold;padding:8px 16px;border-radius:8px;border:2px solid;white-space:nowrap;text-shadow:0 2px 8px rgba(0,0,0,0.8);}
.clash-card-label .clash-sub{font-size:11px;opacity:0.7;}
.clash-player-label .clash-name{background:#060d20;border-color:#4488ff;color:#88bbff;box-shadow:0 0 18px #4488ff44;}
.clash-enemy-label .clash-name{background:#160808;border-color:#ff4444;color:#ff8888;box-shadow:0 0 18px #ff444444;}
.clash-null-label .clash-name{background:#111;border-color:#444;color:#666;}
.clash-center-text{font-size:22px;font-weight:bold;opacity:0;position:absolute;text-align:center;line-height:1.3;text-shadow:0 0 20px currentColor;}

@keyframes slideFromLeft{from{transform:translateX(-280px);opacity:0;}to{transform:translateX(-140px);opacity:1;}}
@keyframes slideFromRight{from{transform:translateX(280px);opacity:0;}to{transform:translateX(140px);opacity:1;}}
@keyframes slideToLeft{from{transform:translateX(-140px);opacity:1;}to{transform:translateX(-280px);opacity:0;}}
@keyframes slideToRight{from{transform:translateX(140px);opacity:1;}to{transform:translateX(280px);opacity:0;}}
@keyframes clashShake{0%,100%{transform:translateX(0) scale(1);}15%{transform:translateX(-8px) scale(1.02);}30%{transform:translateX(8px) scale(1.02);}45%{transform:translateX(-5px);}60%{transform:translateX(5px);}75%{transform:translateX(-3px);}90%{transform:translateX(3px);}}
@keyframes centerPop{0%{transform:scale(0.3);opacity:0;}50%{transform:scale(1.3);opacity:1;}100%{transform:scale(1);opacity:1;}}
@keyframes centerFade{from{opacity:1;transform:scale(1);}to{opacity:0;transform:scale(1.4);}}
@keyframes soloSlide{from{transform:translateX(-180px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes soloSlideFwd{from{transform:translateX(0);opacity:1;}to{transform:translateX(40px);opacity:0;}}

/* ===== REWARD SCREEN ===== */
#screen-reward{flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;background:radial-gradient(ellipse at center,#0a0a22 0%,#050510 70%);overflow-y:auto;}
.reward-title{font-size:30px;font-weight:bold;color:var(--yellow);margin-bottom:8px;text-shadow:0 0 20px #ffdd3355;}
.reward-subtitle{font-size:15px;color:var(--text-dim);margin-bottom:22px;}
.reward-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
.reward-card-wrap{display:flex;flex-direction:column;align-items:center;gap:7px;}
.reward-card{width:145px;height:190px;border-radius:10px;border:2px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;padding:11px;cursor:pointer;transition:all 0.2s;position:relative;}
.reward-card:hover{transform:translateY(-7px) scale(1.04);border-color:var(--yellow);box-shadow:0 0 22px rgba(255,220,50,0.25);}
.reward-card.common{background:#0b0b1a;}
.reward-card.uncommon{background:#070d0b;}
.reward-card.rare{background:#0b070b;}
.reward-card .card-ki-cost{position:absolute;top:7px;right:9px;font-size:17px;font-weight:bold;}
.reward-card .card-name{font-size:14px;font-weight:bold;color:var(--text-bright);margin-bottom:5px;padding-right:26px;}
.reward-card .card-rarity-bar{height:2px;border-radius:2px;margin-bottom:7px;}
.reward-card.common .card-rarity-bar{background:#3a3a5a;}
.reward-card.uncommon .card-rarity-bar{background:#1a6a3a;}
.reward-card.rare .card-rarity-bar{background:#6a1a6a;}
.reward-card .card-desc{font-size:11px;color:#7788aa;flex:1;line-height:1.5;}
.reward-effect-label{font-size:12px;color:var(--orange);}
.reward-skip-btn{margin-top:22px;padding:9px 28px;font-size:14px;color:#553355;background:#0d080d;border:1px solid #3a1a3a;border-radius:6px;cursor:pointer;}
.reward-skip-btn:hover{color:#aa77aa;border-color:#775577;}

/* ===== RESULT SCREEN ===== */
#screen-result{flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#080818 0%,#030308 70%);}
.result-title{font-size:46px;font-weight:bold;margin-bottom:10px;}
.result-subtitle{font-size:18px;color:var(--text-dim);margin-bottom:28px;}
.result-stats{background:#0a0a1e;border:1px solid #181830;border-radius:10px;padding:18px 36px;margin-bottom:22px;min-width:300px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #121225;font-size:15px;}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--text-dim);}
.stat-value{color:var(--text-bright);font-weight:bold;}
.result-restart-btn{padding:13px 44px;font-size:19px;font-weight:bold;background:#080824;border:2px solid #3333aa;color:#7777ee;border-radius:10px;cursor:pointer;transition:all 0.2s;}
.result-restart-btn:hover{background:#14143a;color:#fff;}

/* Info popup */
.info-popup{position:fixed;top:55px;left:50%;transform:translateX(-50%);background:#0b0b1e;border:2px solid #553388;border-radius:10px;padding:14px;min-width:270px;max-width:340px;z-index:100;font-size:12px;box-shadow:0 4px 28px rgba(0,0,0,0.9);}
.info-popup-title{font-size:15px;font-weight:bold;color:var(--text-bright);margin-bottom:10px;}
.info-popup-close{position:absolute;top:7px;right:10px;color:var(--red);cursor:pointer;font-size:17px;background:none;border:none;}
.info-section{margin-bottom:7px;}
.info-section-label{color:#555588;font-size:11px;margin-bottom:3px;}
.info-item{padding:2px 0;color:#9999bb;}

/* Animations */
@keyframes pulse-green{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 18px var(--green)}}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 18px var(--red)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.anim-victory{animation:pulse-green 1s infinite;}
.anim-defeat{animation:pulse-red 1s infinite;}
.fade-in{animation:fadeIn 0.25s ease;}

#regen-indicator{font-size:11px;color:#33ff77;display:none;}
#mark-display{font-size:12px;color:#ffcc33;display:none;}
</style>
</head>
<body>

<!-- CLASH OVERLAY -->
<div id="clash-overlay"></div>

<!-- MAP SCREEN -->
<div id="screen-map" class="screen">
  <h1 class="map-title">🗼 탑 클라이밍</h1>
  <div class="map-subtitle">v3 — 카드 큐 전투 시스템</div>
  <div class="map-player-status" id="map-player-status"></div>
  <div class="floor-list" id="floor-list"></div>
  <button class="map-enter-btn" id="map-enter-btn">▶ 전투 시작</button>
</div>

<!-- BATTLE SCREEN -->
<div id="screen-battle" class="screen">
  <div class="battle-main">
    <div class="enemy-section">
      <div class="enemy-header">
        <span class="enemy-name" id="enemy-name">적</span>
        <span class="enemy-type-badge" id="enemy-badge">일반</span>
        <span id="regen-indicator">재생 1/턴</span>
        <button class="info-btn" id="enemy-info-btn">ℹ️ 정보</button>
      </div>
      <div class="hp-row">
        <span class="hp-label">HP</span>
        <div class="hp-bar-wrap"><div class="hp-bar-fill" id="enemy-hp-fill" style="width:100%"></div></div>
        <span class="hp-text" id="enemy-hp-text">25/25</span>
      </div>
      <div class="ki-row">
        <span class="ki-label">기(氣)</span>
        <div class="ki-dots" id="enemy-ki-dots"></div>
        <span class="ki-text" id="enemy-ki-text">0/5</span>
      </div>
      <div class="enemy-queue-row" id="enemy-queue-row">
        <span class="queue-label">적 큐:</span>
        <div class="enemy-qcard hidden" id="enemy-qcard-0"><span class="qcard-num">1</span><span style="font-size:18px;color:#1a1a33">???</span></div>
        <div class="enemy-qcard hidden" id="enemy-qcard-1"><span class="qcard-num">2</span><span style="font-size:18px;color:#1a1a33">???</span></div>
        <div class="enemy-qcard hidden" id="enemy-qcard-2"><span class="qcard-num">3</span><span style="font-size:18px;color:#1a1a33">???</span></div>
      </div>
    </div>

    <div class="battle-msg-section">
      <div id="phase-text">배치 단계</div>
      <div class="passive-panel" id="passive-panel" style="display:none;"></div>
    </div>

    <div class="vs-area">
      <div class="vs-badge" id="vs-badge">큐 배치 중...</div>
    </div>

    <div class="player-section">

const E_KI_GATHER    = { type:'ki_gather',    name:'기모으기',       desc:'기를 1 충전한다',               kiCost:0, kiGain:1, damage:0 };
const E_ATTACK_S     = { type:'attack_s',     name:'에네르기파',     desc:'플레이어에게 2 피해',            kiCost:1, kiGain:0, damage:2 };

const E_DEFEND       = { type:'defend',       name:'막기',           desc:'파 공격을 완전히 상쇄한다',      kiCost:0, kiGain:0, damage:0 };
const E_ATTACK_ELITE = { type:'attack_l',     name:'에네르기파(대)', desc:'플레이어에게 6 피해',            kiCost:3, kiGain:0, damage:6 };
const E_SPECIAL_BOSS = { type:'special',      name:'마안광선',       desc:'플레이어에게 8 피해 (기 4 필요)',kiCost:4, kiGain:0, damage:8 };
const E_REGENERATE   = { type:'regenerate',   name:'재생집중',       desc:'이번 턴 HP +2 회복',             kiCost:0, kiGain:0, damage:0 };
const E_COMMAND      = { type:'command',      name:'명령 하달',      desc:'다음 큐 공격에 관통 속성 부여',  kiCost:0, kiGain:0, damage:0 };
const E_ATK_PIERCE   = { type:'attack_pierce',name:'관통 공격',      desc:'플레이어에게 5 피해 (막기 무효)',kiCost:0, kiGain:0, damage:5 };

const PIRAFU_PATTERNS = [
  { cond:(hp,maxHp)=>hp/maxHp>0.5,  seq:['ki_gather','ki_gather','attack_l'], telegraphs:['기를 모은다...','기를 모은다...',null] },
  { cond:(hp,maxHp)=>hp/maxHp<=0.5, seq:['ki_gather','attack_l','attack_l'],  telegraphs:['분노하며 기를 모은다!',null,null] },
];
const COLONEL_PATTERNS = [
  { cond:()=>true, seq:['command','attack_pierce','defend'], telegraphs:['명령을 내린다!',null,null] },
];
const PICCOLO_PATTERNS = [
  { cond:(hp,maxHp)=>hp/maxHp>0.6,                            seq:['ki_gather','attack_s','ki_gather'], telegraphs:['기를 끌어모은다...',null,'기를 끌어모은다...'] },
  { cond:(hp,maxHp,ki)=>hp/maxHp<=0.6&&hp/maxHp>=0.3&&ki>=3, seq:['ki_gather','ki_gather','special'],  telegraphs:['기를 끌어모은다...','눈에서 빛이 모인다...','마안광선 발사!!'] },
  { cond:(hp,maxHp,ki)=>hp/maxHp<=0.6&&hp/maxHp>=0.3&&ki<3,  seq:['attack_l','ki_gather','attack_s'],  telegraphs:[null,'기를 끌어모은다...',null] },
  { cond:(hp,maxHp)=>hp/maxHp<0.3,                            seq:['special','regenerate','defend'],    telegraphs:['눈에서 빛이 모인다...','⚠️ 재생 집중 중...',null] },
];
const ACTION_MAPS = {
  normal:  { ki_gather:E_KI_GATHER, attack_s:E_ATTACK_S, attack_l:E_ATTACK_L, defend:E_DEFEND, special:E_ATTACK_ELITE, regenerate:E_REGENERATE, command:E_COMMAND, attack_pierce:E_ATK_PIERCE },
  pirafu:  { ki_gather:E_KI_GATHER, attack_s:E_ATTACK_S, attack_l:E_ATTACK_L, defend:E_DEFEND, special:E_ATTACK_ELITE, regenerate:E_REGENERATE, command:E_COMMAND, attack_pierce:E_ATK_PIERCE },
  colonel: { ki_gather:E_KI_GATHER, attack_s:E_ATTACK_S, attack_l:E_ATTACK_L, defend:E_DEFEND, special:E_ATTACK_ELITE, regenerate:E_REGENERATE, command:E_COMMAND, attack_pierce:E_ATK_PIERCE },
  piccolo: { ki_gather:E_KI_GATHER, attack_s:E_ATTACK_S, attack_l:E_ATTACK_L, defend:E_DEFEND, special:E_SPECIAL_BOSS, regenerate:E_REGENERATE, command:E_COMMAND, attack_pierce:E_ATK_PIERCE },
};

};

// ============================================================
// PLAYER CLASS
// ============================================================
class Player {
  constructor() { this.maxHp=20;this.hp=20;this.maxKi=5;this.ki=0;this.isBlocking=false;this.isDodging=false;this.mark=0; }
  gainKi(n)     { const b=this.ki; this.ki=Math.min(this.maxKi,this.ki+n); return this.ki-b; }
  spendKi(n)    { if(this.ki<n)return false; this.ki-=n; return true; }
  hasKi(n)      { return this.ki>=n; }
  takeDamage(n) { const d=Math.max(0,n); this.hp=Math.max(0,this.hp-d); return d; }
  heal(n)       { this.hp=Math.min(this.maxHp,this.hp+n); }
  onTurnStart() { this.isBlocking=false; this.isDodging=false; }
  isDead()      { return this.hp<=0; }
  addMark(n)    { this.mark=Math.max(0,this.mark+n); }
  consumeMark() { const m=this.mark; if(m>0)this.mark=Math.max(0,this.mark-1); return m; }
}

// ============================================================
// ENEMY CLASS
// ============================================================
class Enemy {
  constructor(type) { this.type=type; this._init(type); this.generateIntent(); }
  _init(type) {
    this.mark=0; this.patternIndex=0; this.passives=[]; this.commandActive=false; this.regenerationCancelled=false;
    if(type==='normal') {
      this.name='레드리본 병사'; const hp=Math.floor(Math.random()*5)+8;
      this.maxHp=hp; this.hp=hp; this.maxKi=3; this.ki=0; this.variant='normal';
    } else if(type==='elite') {
      const isColonel=Math.random()<0.5;
      if(isColonel) {
        this.name='레드리본 대령'; const hp=Math.floor(Math.random()*5)+18;
        this.maxHp=hp; this.hp=hp; this.maxKi=4; this.ki=0; this.variant='colonel';
      } else {
        this.name='피라프단'; const hp=Math.floor(Math.random()*6)+15;
        this.maxHp=hp; this.hp=hp; this.maxKi=5; this.ki=0; this.variant='pirafu';
      }
    } else {
      this.name='피콜로'; this.maxHp=25; this.hp=25; this.maxKi=5; this.ki=0;
      this.variant='piccolo'; this.passives=['regenerate_passive','infinite_cloak'];
    }
  }
  generateIntent() {
    this.regenerationCancelled=false;
    if(this.variant==='normal') this._normalIntent();
    else if(this.variant==='pirafu') this._patternIntent(PIRAFU_PATTERNS, ACTION_MAPS.pirafu);
    else if(this.variant==='colonel') this._patternIntent(COLONEL_PATTERNS, ACTION_MAPS.colonel);
    else this._patternIntent(PICCOLO_PATTERNS, ACTION_MAPS.piccolo);
  }
  _normalIntent() {
    const choose=(ki)=>{ if(Math.random()<0.25)return E_DEFEND; if(ki>=E_ATTACK_S.kiCost)return E_ATTACK_S; return E_KI_GATHER; };
    const k0=this.ki; const a1=choose(k0);
    const k1=Math.min(this.maxKi,k0+(a1.kiGain||0)-a1.kiCost); const a2=choose(k1);
    const k2=Math.min(this.maxKi,k1+(a2.kiGain||0)-a2.kiCost); const a3=choose(k2);
    this.intent=[a1,a2,a3]; this.telegraphs=[null,null,null];
  }
  _patternIntent(patterns, actionMap) {
    const sel=patterns.find(p=>p.cond(this.hp,this.maxHp,this.ki))||patterns[patterns.length-1];
    const seqLen=sel.seq.length; const actions=[]; const telegraphs=[]; let simKi=this.ki;
    const noFallback=['command','regenerate','attack_pierce','defend'];
    for(let i=0;i<3;i++) {
      const si=(this.patternIndex+i)%seqLen; let aType=sel.seq[si]; let tel=sel.telegraphs[si];
      const intended=actionMap[aType];
      if(!noFallback.includes(aType)&&simKi<intended.kiCost){aType='ki_gather';tel=null;}
      const finalA=actionMap[aType]; actions.push(finalA); telegraphs.push(tel);
      simKi=Math.min(this.maxKi,simKi+(finalA.kiGain||0)-finalA.kiCost);
    }
    this.intent=actions; this.telegraphs=telegraphs; this.patternIndex=(this.patternIndex+1)%seqLen;
  }
  executeAction(action) {
    if(this.ki<action.kiCost)return{damage:0,kiGained:0,skipped:true,healed:0};
    this.ki-=action.kiCost; let damage=0,kiGained=0,healed=0;
    switch(action.type) {
      case 'ki_gather': kiGained=action.kiGain||1; this.ki=Math.min(this.maxKi,this.ki+kiGained); break;
      case 'attack_s': case 'attack_l': case 'special': case 'attack_pierce': damage=action.damage||0; break;
      case 'regenerate': if(!this.regenerationCancelled){healed=2;this.hp=Math.min(this.maxHp,this.hp+healed);} break;
      case 'command': this.commandActive=true; break;
      case 'defend': break;
    }
    return{damage,kiGained,skipped:false,healed};
  }
  stealKi(n)    { const s=Math.min(this.ki,n); this.ki-=s; return s; }
  addKi(n)      { this.ki=Math.min(this.maxKi,this.ki+n); }
  takeDamage(n) { const d=Math.max(0,n); this.hp=Math.max(0,this.hp-d); return d; }
  isDead()      { return this.hp<=0; }
  addMark(n)    { this.mark=Math.max(0,this.mark+n); }
  consumeMark() { const m=this.mark; if(m>0)this.mark=Math.max(0,this.mark-1); return m; }
  cancelRegeneration() { this.regenerationCancelled=true; }
  cancelCommand()      { this.commandActive=false; }
  regeneratePassive()  { if(this.passives.includes('regenerate_passive'))this.hp=Math.min(this.maxHp,this.hp+1); }
}

// ============================================================
// DECK CLASS
// ============================================================
class Deck {
  constructor(cardIds) { this.cards=cardIds.map(id=>createCardInstance(id)); this._shuffle(); }
  _shuffle() { for(let i=this.cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[this.cards[i],this.cards[j]]=[this.cards[j],this.cards[i]];} }
  addCard(cardId) { const c=createCardInstance(cardId); const idx=Math.floor(Math.random()*(this.cards.length+1)); this.cards.splice(idx,0,c); }
  getAllCards()       { return this.cards; }
  getAvailableCards() {
    const seen=new Set();
    return this.cards.filter(c=>{
      if(seen.has(c.data.id))return false;
      if(c.usesLeft!==null&&c.usesLeft<=0)return false;
      if(c.data.isPassive)return false;
      seen.add(c.data.id); return true;
    });
  }
  getPassiveCards() { return this.cards.filter(c=>c.data.isPassive); }
}

// ============================================================
// GAME STATE
// ============================================================
class GameState {
  constructor() { this._reset(); }
  _reset() {
    this.currentFloor=1; this.player=new Player(); this.deck=new Deck(STARTER_DECK);
    this.isRunActive=false; this.runResult=null; this.totalDamageDealt=0; this.totalDamageTaken=0;
    this.floors=this._initFloors();
  }
  _initFloors() { const t=['normal','normal','normal','elite','normal','normal','normal','elite','normal','boss']; return t.map((e,i)=>({floor:i+1,enemyType:e,completed:false})); }
  startNewRun()       { this._reset(); this.isRunActive=true; }
  getCurrentFloor()   { return this.floors[this.currentFloor-1]; }
  completeCurrentFloor() { this.floors[this.currentFloor-1].completed=true; this.player.heal(2); }
  advanceFloor()      { if(this.currentFloor<10)this.currentFloor++; else this.endRun(true); }
  endRun(won)         { this.isRunActive=false; this.runResult={won,floorsCleared:won?10:this.currentFloor-1,totalDamageDealt:this.totalDamageDealt,totalDamageTaken:this.totalDamageTaken}; }
  addCardToDeck(id)   { this.deck.addCard(id); }
  recordDamageDealt(n){ this.totalDamageDealt+=n; }
  recordDamageTaken(n){ this.totalDamageTaken+=n; }
}

  const fl=document.getElementById('floor-list'); fl.innerHTML='';
  for(let i=10;i>=1;i--) {
    const f=gs.floors[i-1]; const isCurrent=i===gs.currentFloor; const isCompleted=f.completed;
    const row=document.createElement('div');
    row.className='floor-row'+(isCurrent?' current':isCompleted?' completed':'')+(f.enemyType==='boss'?' boss':f.enemyType==='elite'?' elite':'');
    const labels={normal:'⚔️ 레드리본 병사',elite:'⚡ 엘리트 (피라프단/대령)',boss:'💀 피콜로 - BOSS'};
    const sc=isCompleted?'#33aa33':isCurrent?'var(--blue)':'#222244';
    row.innerHTML=`<span class="floor-num">${i===10?'10F 🏆':`${i}F`}</span><span class="floor-enemy">${labels[f.enemyType]}</span><span class="floor-status" style="color:${sc}">${isCompleted?'✅':isCurrent?'▶':'🔒'}</span>`;
    fl.appendChild(row);
  }
  const fi=gs.getCurrentFloor();
  const tl={normal:'⚔️ 일반 전투',elite:'⚡ 엘리트 전투',boss:'💀 보스 전투!'}[fi.enemyType];
  const btn=document.getElementById('map-enter-btn');
  btn.textContent=`▶ ${gs.currentFloor}층 진입: ${tl}`;
  btn.onclick=()=>{ battle=new BattleGame(); battle.init(); };
}

// ============================================================
// CLASH ANIMATION
// ============================================================
function showClashAnimation(playerCardName, enemyCardName) {
  return new Promise(resolve => {
    const overlay = document.getElementById('clash-overlay');
    overlay.innerHTML = '';

    const isSoloEnemy  = (playerCardName === null);
    const isSoloPlayer = (enemyCardName  === null);
    const isSolo = isSoloEnemy || isSoloPlayer;

    const container = document.createElement('div');
    container.className = 'clash-container';
    overlay.appendChild(container);

    if (!isSolo) {
      // Full clash
      const pLabel = document.createElement('div');
      pLabel.className = 'clash-card-label clash-player-label';
      pLabel.style.cssText = 'left:0;';
      pLabel.innerHTML = `<div class="clash-name">${playerCardName}</div><div class="clash-sub">플레이어</div>`;

      const eLabel = document.createElement('div');
      eLabel.className = 'clash-card-label clash-enemy-label';
      eLabel.style.cssText = 'right:0;';
      eLabel.innerHTML = `<div class="clash-name">${enemyCardName}</div><div class="clash-sub">적</div>`;

      const center = document.createElement('div');
      center.className = 'clash-center-text';
      center.style.color = '#ffdd33';
      center.textContent = '⚡충돌⚡';

      container.appendChild(pLabel);
      container.appendChild(eLabel);
      container.appendChild(center);

      setTimeout(() => {
        pLabel.style.animation = 'slideFromLeft 0.25s ease forwards';
        eLabel.style.animation = 'slideFromRight 0.25s ease forwards';
      }, 10);

      setTimeout(() => {
        center.style.animation = 'centerPop 0.2s ease forwards';
        container.style.animation = 'clashShake 0.35s ease';
      }, 240);

      setTimeout(() => {
        pLabel.style.animation = 'slideToLeft 0.2s ease forwards';
        eLabel.style.animation = 'slideToRight 0.2s ease forwards';
        center.style.animation = 'centerFade 0.2s ease forwards';
      }, 560);

      setTimeout(() => { overlay.innerHTML = ''; resolve(); }, 780);

    } else {
      // Solo fire
      const isPlayerFiring = !isSoloEnemy; // enemy ran out, player fires solo
      const cardName = isPlayerFiring ? playerCardName : enemyCardName;
      const labelClass = isPlayerFiring ? 'clash-player-label' : 'clash-enemy-label';

      const cardLabel = document.createElement('div');
      cardLabel.className = `clash-card-label ${labelClass}`;
      cardLabel.innerHTML = `<div class="clash-name">${cardName}</div><div class="clash-sub">${isPlayerFiring ? '플레이어' : '적'}</div>`;

      const center = document.createElement('div');
      center.className = 'clash-center-text';
      center.style.color = isPlayerFiring ? '#33ff77' : '#ff5544';
      center.innerHTML = isPlayerFiring
        ? '💥 단독 발동!<br><small style="font-size:13px;color:#888">적 카드 없음</small>'
        : '💥 단독 공격!<br><small style="font-size:13px;color:#888">막을 수 없다!</small>';

      container.appendChild(cardLabel);
      container.appendChild(center);

      setTimeout(() => {
        cardLabel.style.animation = 'soloSlide 0.25s ease forwards';
      }, 10);

      setTimeout(() => {
        center.style.animation = 'centerPop 0.2s ease forwards';
      }, 240);

      setTimeout(() => {
        cardLabel.style.animation = 'soloSlideFwd 0.2s ease forwards';
        center.style.animation = 'centerFade 0.2s ease forwards';
      }, 530);

      setTimeout(() => { overlay.innerHTML = ''; resolve(); }, 740);
    }
  });
}

// ============================================================
// BATTLE GAME CLASS (v3 — Card Queue System)
// ============================================================
class BattleGame {
  constructor() {
    this.enemy = new Enemy(gs.getCurrentFloor().enemyType);
    this.playerQueue = [null,null,null];
    this.enemyQueueRevealed = [false,false,false];
    this.selectedCard = null;
    this.phase = 'placement';
    this.senseActive = false;
    this.kiShieldBonus = 0;
    this.consecutiveAttackCount = 0;
    this.infoPopupOpen = false;
  }

  init() {
    showScreen('battle');
    document.getElementById('battle-log').innerHTML = '';
    this._resetQueueUI();
    this._setupEventListeners();
    this._initBattleUI();
    this._updateAllUI();
    this._renderEnemyQueue();
    this._updatePassivePanel();
    this.addLog('── 전투 시작 ──','system');
    this.addLog(`적: ${this.enemy.name} (HP ${this.enemy.hp})`,'enemy');
    this._setPhase('placement');
  }

  _resetQueueUI() {
    for(let i=0;i<3;i++){
      const s=document.getElementById(`player-qslot-${i}`);
      s.className='player-qslot';
      s.innerHTML=`<span class="qslot-num">${i+1}</span><span style="color:#222;font-size:12px">빈 슬롯</span>`;
    }
  }

  _setupEventListeners() {
    for(let i=0;i<3;i++){
      document.getElementById(`player-qslot-${i}`).onclick=()=>this._onSlotClicked(i);
    }
    document.getElementById('execute-btn').onclick=()=>this._onExecuteClicked();
    document.getElementById('enemy-info-btn').onclick=()=>this._toggleInfoPopup();
  }

  _setPhase(phase) {
    this.phase = phase;
    document.getElementById('execute-btn').disabled = (phase==='executing');
    if(phase==='placement'){
      document.getElementById('phase-text').textContent='배치 단계 — 큐에 카드를 배치하세요';
      document.getElementById('execute-hint').textContent='카드를 1~3장 큐에 배치한 후 전투를 실행하세요';
      this._updateVsBadge();
    } else {
      document.getElementById('phase-text').textContent='⚡ 실행 중...';
      document.getElementById('execute-hint').textContent='';
    }
    this._renderHand();
    this._renderPlayerQueue();
  }

  _countPlayerCards() { return this.playerQueue.filter(c=>c!==null).length; }

  _updateVsBadge() {
    const p=this._countPlayerCards();
    document.getElementById('vs-badge').textContent = p>0 ? `플레이어 ${p}장 vs 적 3장` : '큐 배치 중...';
  }

  addLog(msg, type='') {
    const logEl=document.getElementById('battle-log');
    const entry=document.createElement('div');
    entry.className='log-entry fade-in'+(type?` log-${type}`:'');
    entry.textContent=msg;
    logEl.appendChild(entry);
    logEl.scrollTop=logEl.scrollHeight;
    while(logEl.children.length>100)logEl.removeChild(logEl.firstChild);
  }

  _onCardSelected(card) {
    if(this.phase!=='placement')return;
    if(this.selectedCard?.instanceId===card.instanceId){ this.selectedCard=null; this._renderHand(); return; }
    this.selectedCard=card; this._renderHand();
    const maxSlots=this.senseActive?2:3;
    for(let i=0;i<maxSlots;i++){ if(!this.playerQueue[i]){ this._placeCard(card,i); return; } }
  }

  _placeCard(card, slotIdx) {
    if(this.phase!=='placement')return;
    const maxSlots=this.senseActive?2:3;
    if(slotIdx>=maxSlots){ this.addLog(`❌ 감지 효과: 큐 ${slotIdx+1} 사용 불가`,'system'); return; }
    if(this.playerQueue[slotIdx]){
      const old=this.playerQueue[slotIdx];
      if(old.data.id==='sense'){ this.senseActive=false; this._hideAllEnemyCards(); }
    }
    this.playerQueue[slotIdx]=card; this.selectedCard=null;
    this.addLog(`큐 ${slotIdx+1}: [${card.data.name}] 배치`,'player');
    if(card.data.id==='sense'){
      this.senseActive=true;
      this._revealEnemyCard(0); this._revealEnemyCard(1); this._revealEnemyCard(2);
      this.addLog('🔍 [감지]: 적 3큐 전체 공개! (이번 턴 큐 2개 제한)','system');
      if(this.playerQueue[2]){ this.addLog('큐 3: 감지 효과로 제거됨','system'); this.playerQueue[2]=null; }
    }
    if(card.data.id==='scout'){
      const ni=slotIdx+1;
      if(ni<3){ this._revealEnemyCard(ni); this.addLog(`👁 [눈치보기]: 적 큐 ${ni+1} 행동 공개!`,'system'); }
    }
    this._renderHand(); this._renderPlayerQueue(); this._updateAffordability(); this._updateVsBadge();
  }

  _onSlotClicked(slotIdx) {
    if(this.phase!=='placement')return;
    if(this.selectedCard){ this._placeCard(this.selectedCard,slotIdx); }
    else if(this.playerQueue[slotIdx]){
      const removed=this.playerQueue[slotIdx];
      this.playerQueue[slotIdx]=null;
      if(removed.data.id==='sense'){ this.senseActive=false; this._hideAllEnemyCards(); }
      this.addLog(`큐 ${slotIdx+1}: ${removed.data.name} 제거됨`,'system');
      this._renderPlayerQueue(); this._renderHand(); this._updateAffordability(); this._updateVsBadge();
    }
  }

  _revealEnemyCard(idx)  { this.enemyQueueRevealed[idx]=true; this._renderEnemyQCard(idx); }
  _hideAllEnemyCards()   { this.enemyQueueRevealed=[false,false,false]; this._renderEnemyQueue(); }
  _renderEnemyQueue()    { for(let i=0;i<3;i++)this._renderEnemyQCard(i); }
  _renderEnemyQCard(idx) {
    const el=document.getElementById(`enemy-qcard-${idx}`);
    const action=this.enemy.intent[idx]; const tel=this.enemy.telegraphs[idx];
    if(this.enemyQueueRevealed[idx]&&action){
      const isAttack=['attack_s','attack_l','special','attack_pierce'].includes(action.type);
      el.className='enemy-qcard revealed';
      el.style.borderColor=isAttack?'#882222':action.type==='defend'?'#224488':action.type==='regenerate'?'#228844':'#444466';
      el.innerHTML=`<span class="qcard-num">${idx+1}</span><span class="qcard-name">${action.name}</span><span class="qcard-desc">${action.desc}</span>${tel?`<span style="position:absolute;bottom:2px;font-size:9px;color:#997744;text-align:center;">${tel}</span>`:''}`;
    } else {
      el.className='enemy-qcard hidden'; el.style.borderColor='';
      el.innerHTML=`<span class="qcard-num">${idx+1}</span><span style="font-size:18px;color:#1a1a33">???</span>`;
    }
  }

  async _onExecuteClicked() {
    if(this.phase==='executing')return;
    const maxSlots=this.senseActive?2:3;
    const hasAny=this.playerQueue.slice(0,maxSlots).some(c=>c!==null);
    if(!hasAny){ this.addLog('❌ 큐에 카드를 배치하세요!','system'); return; }
    if(this.senseActive&&this.playerQueue[2]){ this.playerQueue[2]=null; this.addLog('🔍 감지 효과: 큐 3 제거됨','system'); }
    await this._executeTurn();
  }

  async _executeTurn() {
    this._setPhase('executing');

    // Piccolo regen passive (turn start)
    if(this.enemy.type==='boss'&&this.enemy.passives.includes('regenerate_passive')){
      this.enemy.regeneratePassive();
      this.addLog('💚 [신진대사 재생] 피콜로 HP +1!','passive');
      this._updateHpBars();
    }

    this._revealEnemyCard(0); this._revealEnemyCard(1); this._revealEnemyCard(2);
    await this._wait(350);

    gs.player.onTurnStart();

    const maxSlots=this.senseActive?2:3;
    // Build compact player queue (only non-null, preserving order)
    const pQueue=[];
    for(let i=0;i<maxSlots;i++){ if(this.playerQueue[i])pQueue.push(this.playerQueue[i]); }
    const eQueue=[...this.enemy.intent];
    const rounds=Math.max(pQueue.length, eQueue.length);

    document.getElementById('vs-badge').textContent=`플레이어 ${pQueue.length}장 vs 적 ${eQueue.length}장`;

    for(let r=0;r<rounds;r++){
      if(gs.player.isDead()||this.enemy.isDead())break;

      const pCard   = pQueue[r]  ?? null;
      const eAction = eQueue[r]  ?? null;

      this._setActiveRound(r, pQueue.length, eQueue.length);
      document.getElementById('phase-text').textContent=`⚡ 라운드 ${r+1} / ${rounds}`;
      document.getElementById('vs-badge').textContent = pCard&&eAction
        ? `[${pCard.data.name}] ⚡ vs ⚡ [${eAction.name}]`
        : pCard ? `[${pCard.data.name}] 💥 단독 발동!`
        : `[${eAction.name}] 💥 단독 공격!`;

      await showClashAnimation(pCard?pCard.data.name:null, eAction?eAction.name:null);

      this.addLog(`── 라운드 ${r+1} ──`,'round');

      if(pCard&&eAction)           await this._executeRound(pCard, eAction, r);
      else if(pCard&&!eAction)     await this._executeSoloPlayer(pCard, r);
      else if(!pCard&&eAction)     await this._executeSoloEnemy(eAction, r);

      this._clearActiveRound();
      this._updateAllUI();
      await this._wait(280);
    }

    this._checkBattleResult();
  }

  _setActiveRound(r, pLen, eLen) {
    for(let i=0;i<3;i++){
      const ps=document.getElementById(`player-qslot-${i}`);
      const es=document.getElementById(`enemy-qcard-${i}`);
      if(i<r){
        ps.classList.add('consumed'); ps.classList.remove('active-round');
        es.classList.add('consumed'); es.classList.remove('active-round');
      } else if(i===r){
        ps.classList.remove('consumed'); es.classList.remove('consumed');
        (i<pLen)?ps.classList.add('active-round'):ps.classList.remove('active-round');
        (i<eLen)?es.classList.add('active-round'):es.classList.remove('active-round');
      } else {
        ps.classList.remove('consumed','active-round');
        es.classList.remove('consumed','active-round');
      }
    }
  }

  _clearActiveRound() {
    for(let i=0;i<3;i++){
      document.getElementById(`player-qslot-${i}`).classList.remove('active-round','consumed');
      document.getElementById(`enemy-qcard-${i}`).classList.remove('active-round','consumed');
    }
  }

  async _executeRound(playerCard, enemyAction, roundIdx) {
    gs.player.isBlocking=false; gs.player.isDodging=false;
    const kiShieldBon=this.kiShieldBonus; if(kiShieldBon>0)this.kiShieldBonus=0;
    let playerKiCost=0, playerValid=false, playerEffType='none';

    playerKiCost=Math.max(playerCard.data.kiCost>0?1:0, playerCard.data.kiCost-kiShieldBon);
    if(playerCard.usesLeft!==null&&playerCard.usesLeft<=0){
      this.addLog(`❌ [${playerCard.data.name}]: 사용 횟수 소진 → 무효`,'system');
    } else if(!gs.player.hasKi(playerKiCost)){
      this.addLog(`❌ [${playerCard.data.name}]: 기 부족 → 무효 (필요: ${playerKiCost})`,'system');
    } else {
      playerValid=true; playerEffType=playerCard.data.effect.type;
    }

    const enemyKiCost=enemyAction.kiCost;
    let priority;
    if(playerKiCost>enemyKiCost)      priority='player_first';
    else if(enemyKiCost>playerKiCost) priority='enemy_first';
    else                              priority='simultaneous';

    const isPlayerBlock=playerValid&&playerEffType==='block';
    const isPlayerDodge=playerValid&&playerEffType==='dodge';
    const isEnemyAttack=['attack_s','attack_l','special','attack_pierce'].includes(enemyAction.type);
    if(isPlayerBlock)gs.player.isBlocking=true;
    if(isPlayerDodge)gs.player.isDodging=true;

    if(playerValid&&playerCard.data.isReactive){
      await this._executeReactive(playerCard,roundIdx,enemyAction,playerKiCost); return;
    }

    const dodgeSucceeds=isPlayerDodge&&isEnemyAttack&&(priority==='player_first'||priority==='simultaneous');

    if(priority==='player_first'){
      await this._doPlayerAction(playerCard,playerValid,playerEffType,roundIdx,enemyAction,playerKiCost);
      await this._doEnemyAction(enemyAction,roundIdx,playerEffType,playerValid,false);
    } else if(priority==='enemy_first'){
      await this._doEnemyAction(enemyAction,roundIdx,playerEffType,playerValid,false);
      const dodgeFail=isPlayerDodge&&isEnemyAttack;
      await this._doPlayerAction(playerCard,playerValid&&!dodgeFail,playerEffType,roundIdx,enemyAction,playerKiCost);
    } else {
      await this._doSimultaneous(playerCard,playerValid,playerEffType,roundIdx,enemyAction,playerKiCost,dodgeSucceeds);
    }
  }

  async _executeSoloPlayer(playerCard, roundIdx) {
    gs.player.isBlocking=false; gs.player.isDodging=false;
    const kiShieldBon=this.kiShieldBonus; if(kiShieldBon>0)this.kiShieldBonus=0;
    const playerKiCost=Math.max(playerCard.data.kiCost>0?1:0, playerCard.data.kiCost-kiShieldBon);

    if(playerCard.usesLeft!==null&&playerCard.usesLeft<=0){
      this.addLog(`❌ [${playerCard.data.name}]: 사용 횟수 소진 → 무효`,'system'); return;
    }
    if(!gs.player.hasKi(playerKiCost)){
      this.addLog(`❌ [${playerCard.data.name}]: 기 부족 → 무효`,'system'); return;
    }

    if(playerCard.data.isReactive){
      gs.player.spendKi(playerKiCost);
      if(playerCard.usesLeft!==null)playerCard.usesLeft-=1;
      this._updateKiDots();
      this.addLog(`⚪ [${playerCard.data.name}]: 단독 발동 — 반응 조건 없음 → 효과 없음`,'system'); return;
    }

    gs.player.spendKi(playerKiCost);
    if(playerCard.usesLeft!==null)playerCard.usesLeft-=1;
    this._updateKiDots();
    const effType=playerCard.data.effect.type;

    switch(effType){
      case 'ki_gain':
        if(gs.player.ki>=gs.player.maxKi){ this.addLog('🔋 기 과부하! 기모으기 실패','system'); }
        else {
          const gained=gs.player.gainKi(playerCard.data.effect.value);
          this.addLog(`✨ [${playerCard.data.name}] 단독: 기 +${gained}`,'player');
          if(this._hasPassive('passive_meditate')){ gs.player.gainKi(1); this._updateKiDots(); this.addLog('🧘 [명상] 기모으기 기 +1 추가!','passive'); }
          this._updateKiDots();
        }
        break;
      case 'damage': {
        const mark=this.enemy.consumeMark(); const markMult=1+mark;
        let dmg=Math.floor(playerCard.data.effect.value*markMult);
        if(mark>0)this.addLog(`🎯 표식 ${mark}중첩! ×${markMult}`,'player');
        const actual=this.enemy.takeDamage(dmg); gs.recordDamageDealt(actual);
        this.addLog(`⚡ [${playerCard.data.name}] 단독 공격: 적에게 ${actual} 피해!`,'player');
        if(this._hasPassive('passive_rapid')){
          this.consecutiveAttackCount++;
          if(this.consecutiveAttackCount>1){ const b=this.consecutiveAttackCount-1; const ba=this.enemy.takeDamage(b); gs.recordDamageDealt(ba); this.addLog(`⚡ [연속파] +${b} 추가 데미지!`,'passive'); }
        } else this.consecutiveAttackCount=0;
        this._updateHpBars();
        break;
      }
      case 'steal_ki': {
        const stolen=this.enemy.stealKi(playerCard.data.effect.value);
        if(stolen>0){ gs.player.gainKi(stolen); this._updateKiDots(); this.addLog(`💰 [${playerCard.data.name}] 단독: 기 ${stolen} 강탈!`,'player'); }
        else this.addLog(`💰 [${playerCard.data.name}]: 적의 기가 없었다.`,'player');
        break;
      }
      case 'mark':
        this.enemy.addMark(playerCard.data.effect.value);
        this.addLog(`🎯 [${playerCard.data.name}] 단독: 적에게 표식 +${playerCard.data.effect.value}!`,'player');
        break;
      case 'block':
      case 'dodge':
        this.addLog(`🛡 [${playerCard.data.name}] 단독: 방어 대상 없음 — 효과 없음`,'system'); break;
      case 'swap_next':
        this.addLog(`👁 [${playerCard.data.name}] 단독 발동`,'player');
        if(this.enemy.commandActive){ this.enemy.cancelCommand(); this.addLog('👁 명령 무효화!','system'); }
        break;
      case 'reveal_all':
        this.addLog('🔍 [감지] 단독: 전략 분석 완료','player');
        if(this.enemy.commandActive){ this.enemy.cancelCommand(); }
        break;
    }
  }

  async _executeSoloEnemy(enemyAction, roundIdx) {
    gs.player.isBlocking=false; gs.player.isDodging=false;
    const res=this.enemy.executeAction(enemyAction);
    if(res.skipped){ this.addLog(`❌ 적 [${enemyAction.name}]: 기 부족 → 무효`,'system'); return; }
    if(res.kiGained>0){ this.addLog(`⚡ 적 [${enemyAction.name}] 단독: 기 +${res.kiGained}`,'enemy'); this._updateKiDots(); }

    if(enemyAction.type==='regenerate'){
      if(this.enemy.regenerationCancelled) this.addLog('💔 [재생집중] 재생 무효화됨!','system');
      else this.addLog(`💚 [재생집중] 피콜로 HP +2 회복!`,'passive');
      this._updateHpBars(); return;
    }
    if(enemyAction.type==='command'){
      this.addLog(this.enemy.commandActive?'📢 [명령 하달] 관통 속성 부여!':'📢 [명령 하달] 무효화됨!','enemy'); return;
    }
    if(enemyAction.type==='defend'){ this.addLog(`🛡 적 [${enemyAction.name}] 단독: 방어 대상 없음`,'system'); return; }
    if(enemyAction.type==='ki_gather') return;

    if(['attack_s','attack_l','special','attack_pierce'].includes(enemyAction.type)&&res.damage>0){
      const isPierce=enemyAction.type==='attack_pierce'&&this.enemy.commandActive;
      if(isPierce)this.enemy.cancelCommand();
      const actualDmg=gs.player.takeDamage(res.damage); gs.recordDamageTaken(actualDmg);
      this.addLog(`💥 적 [${enemyAction.name}] 무방비 단독 공격: ${actualDmg} 피해!`,'enemy');
      this._updateHpBars();
    }
  }

  async _executeReactive(card, roundIdx, enemyAction, actualKiCost) {
    const effectType=card.data.effect.type;
    const reactCond=card.data.reactCond;
    const isEnemyAttack=['attack_s','attack_l','special','attack_pierce'].includes(enemyAction.type);
    let condMet=false;
    if(reactCond==='enemy_attack')condMet=isEnemyAttack;
    else if(reactCond==='enemy_ki_gather')condMet=enemyAction.type==='ki_gather';
    else if(reactCond==='enemy_defend')condMet=enemyAction.type==='defend';
    else if(reactCond==='enemy_energy_attack')condMet=isEnemyAttack;

    if(!gs.player.hasKi(actualKiCost)){
      this.addLog(`❌ [${card.data.name}]: 기 부족 → 무효`,'system');
      await this._doEnemyAction(enemyAction,roundIdx,'none',false,false); return;
    }
    gs.player.spendKi(actualKiCost);
    if(card.usesLeft!==null)card.usesLeft-=1;
    this._updateKiDots();

    if(!condMet){
      this.addLog(`⚪ [${card.data.name}]: 조건 불충족 → 효과 없음`,'system');
      await this._doEnemyAction(enemyAction,roundIdx,'none',false,false); return;
    }
    this.addLog(`⚡ [${card.data.name}]: 반응 발동!`,'player');

    switch(effectType){
      case 'counter': {
        const enemyRes=this.enemy.executeAction(enemyAction); this._updateKiDots();
        if(!enemyRes.skipped&&enemyRes.damage>0){
          const reduced=Math.max(0,enemyRes.damage-2);
          if(reduced>0){ const d=gs.player.takeDamage(reduced); gs.recordDamageTaken(d); this.addLog(`💥 적 ${enemyAction.name}: ${d} 피해 (경감 적용)`,'enemy'); }
          else this.addLog('🛡 카운터 자세로 피해 완전 경감!','player');
        }
        const ctrActual=this.enemy.takeDamage(card.data.effect.value); gs.recordDamageDealt(ctrActual);
        this.addLog(`⚡ 반격: 적에게 ${ctrActual} 피해!`,'player');
        break;
      }
      case 'ki_block': {
        const eRes=this.enemy.executeAction(enemyAction); this._updateKiDots();
        if(!eRes.skipped&&eRes.kiGained>0){ const blk=Math.min(eRes.kiGained,card.data.effect.value); this.enemy.stealKi(blk); this.addLog(`🔰 적 기 +${eRes.kiGained} → ${blk} 차단됨`,'player'); }
        this.kiShieldBonus=1; this.addLog('🔰 다음 라운드 기소모 -1 적용 예약','system');
        break;
      }
      case 'ambush': {
        this.enemy.executeAction(enemyAction); this._updateKiDots();
        const ambActual=this.enemy.takeDamage(card.data.effect.value); gs.recordDamageDealt(ambActual);
        this.addLog(`⚔️ 관통 피해: 적에게 ${ambActual} 피해!`,'player');
        break;
      }
      case 'react_dodge': {
        const eRes=this.enemy.executeAction(enemyAction); this._updateKiDots();
        this.addLog(`💨 반응 순간이동: ${eRes.damage>0?`${eRes.damage}뎀 회피 성공!`:'회피!'}`, 'player');
        break;
      }
    }
  }

  async _doPlayerAction(card, valid, effType, roundIdx, enemyAction, kiCost) {
    if(!card||!valid)return;
    const isEnemyAttack=['attack_s','attack_l','special','attack_pierce'].includes(enemyAction.type);
    gs.player.spendKi(kiCost);
    if(card.usesLeft!==null)card.usesLeft-=1;
    this._updateKiDots();

    switch(effType){
      case 'ki_gain':
        if(gs.player.ki>=gs.player.maxKi){ this.addLog('🔋 기 과부하! 기모으기 실패','system'); }
        else {
          const gained=gs.player.gainKi(card.data.effect.value);
          this.addLog(`✨ [${card.data.name}]: 기 +${gained}`,'player');
          if(!isEnemyAttack&&this._hasPassive('passive_meditate')){ gs.player.gainKi(1); this._updateKiDots(); this.addLog('🧘 [명상] 기 +1 추가!','passive'); }
          this._updateKiDots();
        }
        break;
      case 'block':
        gs.player.isBlocking=true;
        this.addLog(`🛡 [${card.data.name}]: 막기 준비!`,'player');
        if(this.enemy.type==='boss'&&this.enemy.passives.includes('infinite_cloak')){ this.enemy.addKi(1); this.addLog('🌀 [무한의 망토] 발동! 적 기+1','passive'); this._updateKiDots(); }
        if(isEnemyAttack&&this._hasPassive('passive_parry')){ gs.player.gainKi(1); this._updateKiDots(); this.addLog('⚔️ [패링] 막기 성공! 기 +1','passive'); }
        break;
      case 'dodge':
        gs.player.isDodging=true;
        this.addLog(isEnemyAttack?`💨 [${card.data.name}]: 선공 순간이동 → 회피!`:`💨 [${card.data.name}]: 회피 준비!`,'player');
        break;
      case 'damage': await this._applyAttack(card,roundIdx,enemyAction); break;
      case 'steal_ki':
        if(isEnemyAttack){ this.addLog(`❌ [${card.data.name}]: 공격받아 강탈 실패!`,'system'); }
        else {
          const stolen=this.enemy.stealKi(card.data.effect.value);
          if(stolen>0){ gs.player.gainKi(stolen); this._updateKiDots(); this.addLog(`💰 [${card.data.name}]: 기 ${stolen} 강탈!`,'player'); if(this.enemy.commandActive){this.enemy.cancelCommand();this.addLog('💰 명령 무효화!','system');} }
          else this.addLog(`💰 [${card.data.name}]: 적의 기가 없었다.`,'player');
        }
        break;
      case 'mark':
        this.enemy.addMark(card.data.effect.value);
        this.addLog(`🎯 [${card.data.name}]: 표식 +${card.data.effect.value} (누적: ${this.enemy.mark})`,'player');
        break;
      case 'swap_next':
        if(isEnemyAttack){ this.addLog(`❌ [${card.data.name}]: 공격받아 눈치보기 실패!`,'system'); }
        else {
          const ni=roundIdx+1;
          if(ni<3){ this._revealEnemyCard(ni); this.addLog(`👁 [눈치보기]: 적 큐 ${ni+1} 공개!`,'player'); if(this.playerQueue[ni]){this.addLog(`큐 ${ni+1}: 제거`,'system');this.playerQueue[ni]=null;} }
          if(this.enemy.commandActive){this.enemy.cancelCommand();this.addLog('👁 명령 무효화!','system');}
        }
        break;
      case 'reveal_all':
        this.addLog('🔍 [감지]: 적 전략 분석 완료','player');
        if(this.enemy.commandActive){this.enemy.cancelCommand();this.addLog('🔍 명령 무효화!','system');}
        break;
    }
  }

  async _applyAttack(card, roundIdx, enemyAction) {
    const enemyIsDefend=enemyAction.type==='defend';
    const mark=this.enemy.consumeMark(); const markMult=1+mark;
    let dmg=Math.floor(card.data.effect.value*markMult);
    if(mark>0)this.addLog(`🎯 표식 ${mark}중첩! ×${markMult}`,'player');
    if(enemyAction.type==='regenerate'&&dmg>=3){ this.enemy.cancelRegeneration(); this.addLog('⚡ 강한 공격으로 재생 효과 무효화!','system'); }
    if(enemyIsDefend){
      this.addLog(`🛡 적이 막기로 [${card.data.name}]을 막았다!`,'enemy');
    } else {
      const actual=this.enemy.takeDamage(dmg); gs.recordDamageDealt(actual);
      this.addLog(`⚡ [${card.data.name}]: 적에게 ${actual} 피해!`,'player');
      if(this._hasPassive('passive_rapid')){
        this.consecutiveAttackCount++;
        if(this.consecutiveAttackCount>1){ const b=this.consecutiveAttackCount-1; const ba=this.enemy.takeDamage(b); gs.recordDamageDealt(ba); this.addLog(`⚡ [연속파] 연속 공격 +${b} 추가 데미지!`,'passive'); }
      } else this.consecutiveAttackCount=0;
    }
  }

  async _doEnemyAction(enemyAction, roundIdx, playerEffType, playerValid, alreadyDone) {
    const res=this.enemy.executeAction(enemyAction);
    if(res.skipped){ this.addLog(`❌ 적 [${enemyAction.name}]: 기 부족 → 무효`,'system'); return; }
    if(res.kiGained>0){ this.addLog(`⚡ 적 기모으기: +${res.kiGained}`,'enemy'); }
    this._updateKiDots();

    if(enemyAction.type==='regenerate'){
      if(this.enemy.regenerationCancelled)this.addLog('💔 [재생집중] 재생 무효화됨!','system');
      else this.addLog(`💚 [재생집중] 피콜로 HP +2 회복!`,'passive');
      this._updateHpBars(); return;
    }
    if(enemyAction.type==='command'){
      this.addLog(this.enemy.commandActive?'📢 [명령 하달] 관통 속성 부여!':'📢 명령 무효화됨!','enemy'); return;
    }

    if(['attack_s','attack_l','special','attack_pierce'].includes(enemyAction.type)&&res.damage>0){
      const isPierce=enemyAction.type==='attack_pierce'&&this.enemy.commandActive;
      const pBlocking=gs.player.isBlocking; const pDodging=gs.player.isDodging;
      if(pDodging){
        this.addLog(`💨 순간이동으로 [${enemyAction.name}] 회피!`,'player');
        if(isPierce)this.enemy.cancelCommand();
      } else if(pBlocking&&!isPierce){
        this.addLog(`🛡 막기로 [${enemyAction.name}] 상쇄!`,'player');
      } else {
        if(isPierce&&pBlocking){ this.addLog(`⚔️ [관통 공격] 막기 무시!`,'enemy'); this.enemy.cancelCommand(); }
        let finalDmg=res.damage;
        if(playerEffType==='ki_gain'&&playerValid&&this._hasPassive('passive_meditate'))finalDmg+=1;
        const actualDmg=gs.player.takeDamage(finalDmg); gs.recordDamageTaken(actualDmg);
        this.addLog(`💥 적 [${enemyAction.name}]: ${actualDmg} 피해!`,'enemy');
      }
      this._updateHpBars();
    }
  }

  async _doSimultaneous(playerCard, playerValid, effType, roundIdx, enemyAction, kiCost, playerDodgeSuccess) {
    const playerIsAttack=playerValid&&effType==='damage';
    const enemyIsAttack=['attack_s','attack_l','special','attack_pierce'].includes(enemyAction.type);

    if(playerIsAttack&&enemyIsAttack){
      const mark=this.enemy.consumeMark(); const markMult=1+mark;
      let playerDmg=Math.floor(playerCard.data.effect.value*markMult);
      if(mark>0)this.addLog(`🎯 표식 ${mark}중첩! ×${markMult}`,'player');
      const enemyDmg=enemyAction.damage||0;
      const netPlayerDmg=Math.max(0,playerDmg-enemyDmg);
      const netEnemyDmg=Math.max(0,enemyDmg-playerDmg);
      gs.player.spendKi(kiCost);
      if(playerCard.usesLeft!==null)playerCard.usesLeft-=1;
      const res=this.enemy.executeAction(enemyAction); this._updateKiDots();
      if(enemyAction.type==='regenerate'&&playerDmg>=3)this.enemy.cancelRegeneration();
      if(netPlayerDmg>0){ const actual=this.enemy.takeDamage(netPlayerDmg); gs.recordDamageDealt(actual); this.addLog(`⚡ [${playerCard.data.name}]: 상쇄 후 적에게 ${actual} 피해!`,'player'); }
      else if(playerDmg>0){ this.addLog(`💥 동시 공격: 완전 상쇄! (플레이어 ${playerDmg} vs 적 ${enemyDmg})`,'system'); }
      if(netEnemyDmg>0&&!gs.player.isDodging){ const ad=gs.player.takeDamage(netEnemyDmg); gs.recordDamageTaken(ad); this.addLog(`💥 상쇄 후 ${ad} 피해 받음!`,'enemy'); }
      this._updateHpBars();
    } else {
      await this._doPlayerAction(playerCard,playerValid,effType,roundIdx,enemyAction,kiCost);
      await this._doEnemyAction(enemyAction,roundIdx,effType,playerValid,false);
    }
  }

  _checkBattleResult() {
    if(this.enemy.isDead()){
      this.addLog(`🏆 ${this.enemy.name} 격파!`,'system');
      gs.completeCurrentFloor();
      setTimeout(()=>{ initRewardScreen(); },800);
    } else if(gs.player.isDead()){
      this.addLog('💀 패배...','system');
      gs.endRun(false);
      setTimeout(()=>{ initResultScreen(); },1000);
    } else {
      this.enemy.generateIntent();
      this._hideAllEnemyCards();
      this.playerQueue=[null,null,null];
      this.senseActive=false;
      this.consecutiveAttackCount=0;
      gs.player.onTurnStart();
      this._setPhase('placement');
      this.addLog('── 새 턴 ──','divider');
    }
  }

  _hasPassive(id) { return gs.deck.getAllCards().some(c=>c.data.id===id); }

  _updateAllUI() {
    this._updateHpBars(); this._updateKiDots();
    this._renderPlayerQueue(); this._renderHand();
    this._updateMarkDisplay();
  }

  _updateHpBars() {
    const p=gs.player; const e=this.enemy;
    document.getElementById('player-hp-fill').style.width=`${(p.hp/p.maxHp)*100}%`;
    document.getElementById('player-hp-text').textContent=`${p.hp}/${p.maxHp}`;
    document.getElementById('enemy-hp-fill').style.width=`${(e.hp/e.maxHp)*100}%`;
    document.getElementById('enemy-hp-text').textContent=`${e.hp}/${e.maxHp}`;
  }

  _updateKiDots() {
    const rd=(dotsEl,textEl,cur,max)=>{
      dotsEl.innerHTML='';
      for(let i=0;i<max;i++){ const d=document.createElement('div'); d.className='ki-dot'+(i<cur?' filled'+(i===max-1&&cur===max?' max':''):''); dotsEl.appendChild(d); }
      textEl.textContent=`${cur}/${max}`;
    };
    rd(document.getElementById('player-ki-dots'),document.getElementById('player-ki-text'),gs.player.ki,gs.player.maxKi);
    rd(document.getElementById('enemy-ki-dots'),document.getElementById('enemy-ki-text'),this.enemy.ki,this.enemy.maxKi);
  }

  _updateMarkDisplay() {
    const m=document.getElementById('mark-display');
    if(this.enemy.mark>0){ m.style.display='inline'; m.textContent=`🎯 표식 ${this.enemy.mark}중첩`; }
    else m.style.display='none';
  }

  _renderPlayerQueue() {
    for(let i=0;i<3;i++){
      const slot=document.getElementById(`player-qslot-${i}`);
      const card=this.playerQueue[i];
      const isDisabled=i>=2&&this.senseActive&&i===2;
      slot.className='player-qslot'+(card?' occupied':'')+(this.senseActive&&i>=2?' sense-disabled':'');
      if(this.senseActive&&i>=2){
        slot.innerHTML=`<span class="qslot-num">${i+1}</span><span style="color:#222;font-size:11px">감지 제한</span>`;
      } else if(card){
        const kiColor=card.data.kiCost===0?'var(--green)':card.data.kiCost<=2?'var(--yellow)':'var(--red)';
        slot.innerHTML=`<span class="qslot-num">${i+1}</span><button class="remove-btn" onclick="battle._removeQueueCard(${i});event.stopPropagation()">✕</button><span class="qslot-name">${card.data.name}</span><span class="qslot-ki" style="color:${kiColor}">기 ${card.data.kiCost}</span><span class="qslot-desc">${card.data.desc.replace(/\n/g,' ').substring(0,35)}</span>`;
      } else {
        slot.innerHTML=`<span class="qslot-num">${i+1}</span><span style="color:#222;font-size:12px">빈 슬롯</span>`;
      }
    }
  }

  _removeQueueCard(idx) {
    if(this.phase!=='placement')return;
    const card=this.playerQueue[idx]; if(!card)return;
    this.playerQueue[idx]=null;
    if(card.data.id==='sense'){this.senseActive=false;this._hideAllEnemyCards();}
    this.addLog(`큐 ${idx+1}: ${card.data.name} 제거됨`,'system');
    this._renderPlayerQueue(); this._renderHand(); this._updateAffordability(); this._updateVsBadge();
  }

  _renderHand() {
    const handEl=document.getElementById('hand-cards'); handEl.innerHTML='';
    const available=gs.deck.getAvailableCards();
    available.forEach(card=>{
      const el=document.createElement('div');
      const isSelected=this.selectedCard?.instanceId===card.instanceId;
      const insufficient=this.phase==='placement'&&!gs.player.hasKi(card.data.kiCost);
      el.className=`card ${card.data.rarity}${isSelected?' selected':''}${insufficient?' insufficient':''}`;
      const kiColor=card.data.kiCost===0?'free':card.data.kiCost<=2?'cheap':'costly';
      const usesHtml=card.usesLeft!==null?`<div class="card-uses">${card.usesLeft}회 남음</div>`:'';
      const reactHtml=card.data.isReactive?`<div class="card-reactive-badge">반응</div>`:'';
      el.innerHTML=`<div class="card-ki-cost ${kiColor}">${card.data.kiCost}</div><div class="card-name">${card.data.name}</div><div class="card-rarity-bar"></div><div class="card-desc">${card.data.desc.replace(/\n/g,'<br>')}</div>${usesHtml}${reactHtml}`;
      if(this.phase==='placement')el.onclick=()=>this._onCardSelected(card);
      handEl.appendChild(el);
    });
    document.getElementById('deck-info').textContent=`(덱 ${gs.deck.getAllCards().length}장)`;
  }

  _updateAffordability() {
    const cards=document.getElementById('hand-cards').querySelectorAll('.card');
    const available=gs.deck.getAvailableCards();
    available.forEach((card,i)=>{ if(cards[i])cards[i].classList.toggle('insufficient',!gs.player.hasKi(card.data.kiCost)); });
  }

  _updatePassivePanel() {
    const passives=gs.deck.getPassiveCards(); const panel=document.getElementById('passive-panel');
    if(passives.length===0){panel.style.display='none';return;}
    panel.style.display='inline-flex';
    panel.innerHTML='패시브: '+passives.map(c=>`<span class="passive-tag" id="ptag_${c.data.id}">${c.data.name.replace(' (패시브)','')}</span>`).join('');
    document.getElementById('regen-indicator').style.display=(this.enemy.type==='boss'&&this.enemy.passives.includes('regenerate_passive'))?'inline':'none';
  }

  _initBattleUI() {
    const e=this.enemy;
    document.getElementById('enemy-name').textContent=e.name;
    const badge=document.getElementById('enemy-badge');
    badge.textContent={normal:'일반',elite:'엘리트',boss:'BOSS'}[e.type];
    badge.className='enemy-type-badge badge-'+e.type;
  }

  _toggleInfoPopup() {
    if(this.infoPopupOpen){this._closeInfoPopup();return;}
    this.infoPopupOpen=true;
    const e=this.enemy;
    const popup=document.createElement('div');
    popup.className='info-popup fade-in'; popup.id='enemy-info-popup';
    let html=`<button class="info-popup-close" onclick="battle._closeInfoPopup()">✕</button><div class="info-popup-title">📋 ${e.name}</div><div class="info-section"><div class="info-section-label">상태</div><div class="info-item">HP: ${e.hp} / ${e.maxHp} | 기: ${e.ki} / ${e.maxKi}</div></div>`;
    if(e.passives.length>0){html+=`<div class="info-section"><div class="info-section-label">패시브</div>`;e.passives.forEach(pid=>{const p=ENEMY_PASSIVES_DATA[pid];if(p)html+=`<div class="info-item">• ${p.name}: ${p.desc}</div>`;});html+='</div>';}
    html+=`<div class="info-section"><div class="info-section-label">큐 행동</div>`;
    e.intent.forEach((action,i)=>{html+=`<div class="info-item">큐${i+1}: ${action.name} (기${action.kiCost}) - ${action.desc}</div>`;});
    html+='</div>';
    popup.innerHTML=html;
    document.body.appendChild(popup);
  }
  _closeInfoPopup() { this.infoPopupOpen=false; const p=document.getElementById('enemy-info-popup'); if(p)p.remove(); }

  async _wait(ms) { return new Promise(r=>setTimeout(r,ms)); }
}

// ============================================================
// REWARD SCREEN
// ============================================================
function initRewardScreen() {
  showScreen('reward');
  document.getElementById('reward-subtitle').textContent=`${gs.currentFloor}층 클리어! 카드 1개를 선택해 덱에 추가하세요`;
  const owned=new Set(gs.deck.getAllCards().map(c=>c.data.id));
  const pool=REWARD_POOL.filter(id=>!owned.has(id));
  const picks=[]; const poolCopy=[...pool];
  for(let i=0;i<3&&poolCopy.length>0;i++){ const idx=Math.floor(Math.random()*poolCopy.length); picks.push(poolCopy.splice(idx,1)[0]); }
  const container=document.getElementById('reward-cards'); container.innerHTML='';
  if(picks.length===0){
    container.innerHTML='<div style="color:#555;font-size:15px;">모든 카드를 이미 보유하고 있습니다!</div>';
  } else {
    picks.forEach(cardId=>{
      const data=CARD_DB[cardId]; const wrap=document.createElement('div'); wrap.className='reward-card-wrap';
      const kiColor=data.kiCost===0?'var(--green)':data.kiCost<=2?'var(--yellow)':'var(--red)';
      const usesText=CARD_USE_LIMITS[cardId]?`사용 ${CARD_USE_LIMITS[cardId]}회`:'무제한';
      const cardEl=document.createElement('div'); cardEl.className=`reward-card ${data.rarity}`;
      cardEl.innerHTML=`<div class="card-ki-cost" style="color:${kiColor}">${data.kiCost}</div><div class="card-name">${data.name}</div><div class="card-rarity-bar"></div><div class="card-desc">${data.desc.replace(/\n/g,'<br>')}</div>`;
      cardEl.onclick=()=>_onRewardCardSelected(cardId,cardEl,container);
      const label=document.createElement('div'); label.className='reward-effect-label';
      label.textContent=`${{common:'일반',uncommon:'고급',rare:'희귀'}[data.rarity]} | ${usesText}`;
      wrap.appendChild(cardEl); wrap.appendChild(label); container.appendChild(wrap);
    });
  }
  document.getElementById('reward-skip-btn').onclick=()=>_proceedFromReward();
}

function _onRewardCardSelected(cardId, cardEl, container) {
  gs.addCardToDeck(cardId);
  container.querySelectorAll('.reward-card').forEach(c=>c.style.pointerEvents='none');
  const feedback=document.createElement('div');
  feedback.style.cssText='color:var(--green);font-size:17px;font-weight:bold;margin-top:18px;';
  feedback.textContent=`✅ ${CARD_DB[cardId].name}을 덱에 추가했습니다!`;
  container.parentElement.insertBefore(feedback,document.getElementById('reward-skip-btn'));
  setTimeout(_proceedFromReward,1200);
}

function _proceedFromReward() {
  gs.advanceFloor();
  if(!gs.isRunActive)initResultScreen();
  else initMapScreen();
}

// ============================================================
// RESULT SCREEN
// ============================================================
function initResultScreen() {
  showScreen('result');
  const r=gs.runResult; if(!r)return;
  const titleEl=document.getElementById('result-title');
  const subtitleEl=document.getElementById('result-subtitle');
  const statsEl=document.getElementById('result-stats');
  document.getElementById('screen-result').classList.remove('anim-victory','anim-defeat');
  if(r.won){
    titleEl.textContent='🏆 런 클리어!'; titleEl.style.color='var(--yellow)';
    subtitleEl.textContent='피콜로를 쓰러뜨렸다!'; subtitleEl.style.color='var(--red)';
    document.getElementById('screen-result').classList.add('anim-victory');
  } else {
    titleEl.textContent='💀 패배...'; titleEl.style.color='var(--red)';
    subtitleEl.textContent='다시 도전하라!'; subtitleEl.style.color='var(--text-dim)';
    document.getElementById('screen-result').classList.add('anim-defeat');
  }
  statsEl.innerHTML=`
    <div class="stat-row"><span class="stat-label">클리어한 층</span><span class="stat-value">${r.floorsCleared}층</span></div>
    <div class="stat-row"><span class="stat-label">준 피해 합계</span><span class="stat-value">${r.totalDamageDealt}</span></div>
    <div class="stat-row"><span class="stat-label">받은 피해 합계</span><span class="stat-value">${r.totalDamageTaken}</span></div>
  `;
  document.getElementById('result-restart-btn').onclick=()=>{
    gs=new GameState(); gs.startNewRun(); battle=null; initMapScreen();
  };
}

// ============================================================
// INIT
// ============================================================
gs.startNewRun();
initMapScreen();
</script>
</body>
</html>
